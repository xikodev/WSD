<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Memory Game</title>
        <link rel="stylesheet" href="memory.css" />
    </head>
    <body>
        <main class="game">
            <header class="status">
                <div id="score">Score: 0</div>
                <div id="timer">Time: 60</div>
            </header>

            <section id="board" aria-label="Memory cards"></section>

            <section class="notes">
                <label for="comment">Comment</label>
                <textarea id="comment" readonly>Done: created a full memory game with 16 shuffled cards, scoring, 60-second timer, matching logic, win/lose alerts, and final card reveal. Not done: none.</textarea>
            </section>
        </main>

        <script src="memory.js"></script>
    </body>
</html>
