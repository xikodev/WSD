<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>2. Slagalica</title>
    </head>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f7fb;
            font-family: Arial, sans-serif;
        }

        #counter {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 12px 18px;
            border: 2px solid #000;
            border-radius: 14px;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
        }

        .game-container {
            width: 60%;
            max-width: 720px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .tile {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            background: lightskyblue;
            border: 4px solid transparent;
            border-radius: 16px;
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: bold;
        }

        .tile:hover {
            cursor: pointer;
            opacity: 0.5;
        }

        .tile.selected {
            border-color: gray;
            background: lightyellow;
            opacity: 1;
        }

        .hidden {
            display: none;
        }

        #msgGameOver {
            margin: 0;
            font-size: clamp(2.5rem, 7vw, 5rem);
            text-align: center;
        }

        @media (max-width: 700px) {
            .game-container {
                width: 84%;
                gap: 10px;
            }

            #counter {
                top: 14px;
                right: 14px;
                padding: 10px 14px;
                font-size: 1.1rem;
            }
        }
    </style>
    <body>
        <div id="counter">0</div>
        <div class="game-container">
            <div class="tile">1</div>
            <div class="tile">4</div>
            <div class="tile">6</div>

            <div class="tile">2</div>
            <div class="tile">9</div>
            <div class="tile">3</div>

            <div class="tile">5</div>
            <div class="tile">8</div>
            <div class="tile">7</div>
        </div>
        <h1 id="msgGameOver" class="hidden">Game over!</h1>
    </body>
    <script>
        const tiles = Array.from(document.querySelectorAll(".tile"));
        const counter = document.getElementById("counter");
        const gameContainer = document.querySelector(".game-container");
        const gameOverMessage = document.getElementById("msgGameOver");

        let selectedTile = null;
        let moves = 0;

        for (const tile of tiles) {
            tile.addEventListener("click", () => handleTileClick(tile));
        }

        function handleTileClick(tile) {
            if (selectedTile === null) {
                selectedTile = tile;
                tile.classList.add("selected");
                return;
            }

            if (selectedTile === tile) {
                tile.classList.remove("selected");
                selectedTile = null;
                return;
            }

            swapTileValues(selectedTile, tile);
            selectedTile.classList.remove("selected");
            selectedTile = null;
            moves += 1;
            counter.textContent = moves;
            checkGameOver();
        }

        // Swapping text content is enough because each tile is represented only by its number.
        function swapTileValues(firstTile, secondTile) {
            const firstValue = firstTile.textContent;
            firstTile.textContent = secondTile.textContent;
            secondTile.textContent = firstValue;
        }

        function checkGameOver() {
            const currentOrder = tiles.map((tile) => Number(tile.textContent));

            for (let i = 0; i < currentOrder.length; i += 1) {
                if (currentOrder[i] !== i + 1) {
                    return;
                }
            }

            gameContainer.classList.add("hidden");
            gameOverMessage.classList.remove("hidden");
        }
    </script>
</html>
