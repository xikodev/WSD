<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>1. CSS</title>
        <style>
            @font-face {
                font-family: 'Roboto-Regular';
                src: url('./Roboto-Regular.ttf');
            }

            body {
                font-family: "Roboto-Regular", sans-serif;
            }

            div.card {
                position: relative;
                width: 400px;
                border-radius: 1em;
                background-color: whitesmoke;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 1.25em 1.5em 2em;
            }

            div.card-avatar {
                width: 52%;
                margin-top: 0.4em;
            }

            div.card-avatar img {
                width: 100%;
            }

            div.card-name {
                margin: 0.55em 0 0.2em;
                font-size: 1.15cm;
                font-weight: bold;
            }

            div.card-job {
                font-size: 0.42cm;
            }

            div.card-info {
                margin: 2.1em 0 2.4em;
                width: 78%;
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
            }

            div.card-info div {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0.35em;
                text-align: center;
            }

            div.card-info div img {
                width: 30px;
            }

            button {
                border: 1px solid black;
                padding: 0.7em 1.4em;
                border-radius: 10px;
                background-color: lightblue;
                font-size: 0.4cm;
            }

            button.card-close {
                font-size: 1.5em;
                border-radius: 90px;
                width: 38px;
                height: 38px;
                padding: 0;
                position: absolute;
                top: 12px;
                right: 12px;
            }

            div.card-action {
                margin: 0;
            }

        </style>
    </head>

    <body style="background-color: darkgrey">
        <div class="card">
            <button class="card-close">X</button>
            <div class="card-avatar">
                <img src="avatar.png" alt="Mock avatar" />
            </div>
            <div class="card-name">Ana Anić</div>
            <div class="card-job">CSS developer</div>
            <div class="card-info">
                <div>
                    <div>
                        <img src="education.png" alt="Education" />
                    </div>
                    <div>MSc</div>
                </div>
                <div>
                    <div>
                        <img src="pin.png" alt="Location" />
                    </div>
                    <div>Zagreb, Croatia</div>
                </div>
                <div>
                    <div>
                        <img src="online.png" alt="Online" />
                    </div>
                    <div>Online</div>
                </div>
            </div>
            <div class="card-action">
                <button>Add friend</button>
            </div>
        </div>
    </body>
</html>
