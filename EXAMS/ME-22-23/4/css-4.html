<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4. zadatak (CSS)</title>
    <style>
    * {
        box-sizing: border-box;
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        margin: 0;
        padding: 0;
        font-size: 30px;
    }

    .mobile-menu {
        display: none;
    }

    .container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        padding: 12px;
    }

    .card {
        width: 400px;
        height: 300px;
        border: 1px solid #666;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .back-to-top {
        display: none;
    }

    @media (max-width: 767px) {
        .mobile-menu {
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-around;
            padding: 8px 10px;
            background: white;
        }

        .container {
            padding-top: 0;
        }

        .card {
            width: 90vw;
            max-width: none;
        }

        .back-to-top {
            position: fixed;
            right: 12px;
            bottom: 12px;
            display: inline-block;
            padding: 6px 10px;
            border: 1px solid #777;
            background: white;
            font-size: 16px;
            text-decoration: none;
            color: blue;
        }
    }
    </style>
</head>
<body>
    <div id="top"></div>
    <div class="mobile-menu">
        <a href="#card-1">Kartica 1</a>
        <a href="#card-2">Kartica 2</a>
        <a href="#card-3">Kartica 3</a>
        <a href="#card-4">Kartica 4</a>
    </div>
    <div class="container">
        <div class="card" id="card-1">
            Kartica 1
        </div>
        <div class="card" id="card-2">
            Kartica 2
        </div>
        <div class="card" id="card-3">
            Kartica 3
        </div>
        <div class="card" id="card-4">
            Kartica 4
        </div>
    </div>
    <a class="back-to-top" href="#top">Povratak na vrh</a>
</body>
</html>
