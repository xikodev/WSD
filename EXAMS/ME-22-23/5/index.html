<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookies Consent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="cookie-consent" class="cookie-consent hidden">
        <div class="cookie-header">
            <img
                class="cookie-icon"
                alt="Cookie icon"
                src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64' viewBox='0 0 64 64'><circle cx='24' cy='34' r='18' fill='white' stroke='royalblue' stroke-width='3'/><circle cx='40' cy='26' r='18' fill='white' stroke='turquoise' stroke-width='3'/><circle cx='18' cy='28' r='2.4' fill='lightskyblue'/><circle cx='26' cy='36' r='2.4' fill='lightskyblue'/><circle cx='16' cy='40' r='2.4' fill='lightskyblue'/><circle cx='38' cy='18' r='2.4' fill='lightskyblue'/><circle cx='44' cy='28' r='2.4' fill='lightskyblue'/><circle cx='34' cy='30' r='2.4' fill='lightskyblue'/><path d='M54 26a12 12 0 0 1-12 12 12 12 0 0 1-12-12c0-1 0.1-1.9 0.3-2.8A8 8 0 0 0 38 15a8 8 0 0 0 8-8c0.9 0 1.8 0.1 2.7 0.3A12 12 0 0 1 54 26z' fill='white'/></svg>"
            >
            <h1>Cookies Consent</h1>
        </div>
        <p class="cookie-text">
            This is a message related to the cookie use on this site.
            Please accept or reject cookie usage.
            <a href="#">More info...</a>
        </p>
        <div class="cookie-actions">
            <button id="accept-btn" class="cookie-btn accept-btn" type="button">Accept</button>
            <button id="reject-btn" class="cookie-btn reject-btn" type="button">Reject</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
