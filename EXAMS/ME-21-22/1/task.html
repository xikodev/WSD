<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 1</title>
    <style>
        table {
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid black;
            padding: 8px 12px;
            text-align: center;
        }

        th {
            text-align: left;
        }

        img {
            width: 200px;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th colspan="4">Zaglavlje</th>
        </tr>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td rowspan="3">
                <img
                    src="https://www.fer.unizg.hr/images/50029121/FER_logo_3.png"
                    alt="FER logo"
                >
            </td>
        </tr>
        <tr>
            <td>4</td>
            <td>5</td>
            <td>6</td>
        </tr>
        <tr>
            <td>7</td>
            <td>8</td>
            <td>9</td>
        </tr>
    </table>
</body>
</html>
