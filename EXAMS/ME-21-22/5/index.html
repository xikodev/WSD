<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Power Customer Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="feedback-box">
        <h1>Flower Power Customer Feedback Form</h1>
        <p>
            How was your experience with the Flower Power web shop?
            We want to hear from you!
        </p>

        <form id="feedback-form" novalidate>
            <div class="form-row">
                <label for="name">Name:</label>
                <input id="name" name="name" type="text">
                <div id="name-error" class="error"></div>
            </div>

            <div class="form-row">
                <label for="email">E-mail:</label>
                <input id="email" name="email" type="text">
                <div id="email-error" class="error"></div>
            </div>

            <div class="form-row">
                <label for="message">Feedback:</label>
                <textarea id="message" name="message" rows="4"></textarea>
                <div id="message-error" class="error"></div>
            </div>

            <div class="actions">
                <button id="save-draft" type="button">Save Draft</button>
                <button type="submit">Submit</button>
            </div>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
