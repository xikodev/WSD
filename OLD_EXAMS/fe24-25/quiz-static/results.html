<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Kviz uspješno završen!</h1>
        </div>

        <div class="main">
            <div class="results-card">
                <h2>Koliko poznaješ legendarne svjetove?</h2>
                
                <div class="score-display">
                     <div class="score-text">
						4/6 točnih odgovora (67%)
                    </div>
                </div>


                <div class="actions">
                    <div class="btn-secondary">Natrag na početnu</div>
                    <div style="display: inline;">
                        <div class="btn-primary">Pokušaj ponovno</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
