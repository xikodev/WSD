<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question 1</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Koliko poznaješ legendarne svjetove?</h1>
            <div class="progress">
                Pitanje 1 of 6
            </div>
        </div>

        <div class="main">
            <div class="question-card">
                <div class="category-badge">
                    Star Wars
                </div>
                <h2 class="question-title">
                    Koji je rodni planet Lukea Skywalkera?
                </h2>

                <div>
                    <div class="options">
                        
                            <label class="option">
                                <input type="radio" name="answer">
                                <span class="option-text">
                                    A. Coruscant
                                </span>
                            </label>
                        
                            <label class="option">
                                <input type="radio" name="answer">
                                <span class="option-text">
                                    B. Hoth
                                </span>
                            </label>
                        
                            <label class="option">
                                <input type="radio" name="answer">
                                <span class="option-text">
                                    C. Tatooine
                                </span>
                            </label>
                        
                            <label class="option">
                                <input type="radio" name="answer">
                                <span class="option-text">
                                    D. Dagobah
                                </span>
                            </label>
                        
                    </div>

                    <div class="submit-btn">Sljedeće pitanje</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
